<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline</title>
    <style>
        .box {
            display: inline;
            display: inline block;
            border: 2px solid gold;
            margin: 10px;
            padding: 0px;
            /* box-shadow: 5px 5px 5px 5px  ; */
        }


        .box1 {
            display: inline;
            display: inline block;
            margin: 10px;
            border: 2px solid black;
            padding: 0px;
        }

        .p {
            border: 2px solid #c1fc11;
            margin: 20px;
            padding: 2px;
            color: rgb(119, 167, 136);
            /* only three hoff voffset blur */
            text-shadow: 2px 2px 2px rgb(155, 172, 185);

            /* hm sb change kr ske insepect m jakr or bad m use coppy kr skte h yha paste  kr do     text-shadow: -20px -4px 15px rgb(39 167 38); */

                text-shadow: -20px -4px 15px rgb(39 167 38);
            background-color: rgb(33, 51, 77);

            /* outline k sath use direct upr niche age piche krke value change se box change ho jata h border nhi 
            border k bahar outline 
            */
outline : 2px solid black ;
            border-radius: 2px ;

outline-offset: 10px ;
        }
    </style>

</head>

<body>
    <!-- shadow and outline box  -->
    <div class="box ">
        i am a box
    </div>

    <div class="box1">
        i am box one1
    </div>

    <div class="p">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Reiciendis doloremque enim animi eius nisi.
    </div>

</body>

</html>
