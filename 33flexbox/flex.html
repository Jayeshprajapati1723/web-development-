<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>
.container{
    display : flex ;
    height : 80vh ;
    width : 100vw ;
    border : 2px solid red ;
    justify-content: center;
align-items: center;
/* most yhi use hote h  */
justify-content: flex-end;
justify-content: flex-start
;
/* justify-content: space-around; space a jati h item k bich m  */
/* justify-content: space-between isse bhi space  a jati h ; */
/* align-items: last baseline */
;
/* main axis x axis
and verticle me cross axis jisme y axis jesa 

ise hm channge kr skte h 
hmesha main axis k basis pr contents item set krta h 
*/

/* align content tb kro jab hmare pass mutliple lines ho single k align item hi thik h */
/* bhot jada box h to unhe wrap kr skteh flex: wrap se  */
flex-wrap: wrap;
/* flex-wrap: wrap-reverse; isse reverse hota h jo last k box h vo phle row m first k last row m  */
/* align-content: flex-end; */
/* align-items:center ; */
/* align-content: center; */
/* gap gap colom gap row sb set kr skte h  */
gap: 10px ;
row-gap: 2px ;
column-gap: 1px;;
/* gap: 10px 3pxrow /colom ; */


}

        .item{
                flex-grow: 1 ;
                /* flex grow mtlb abhi ek box item one ki jagah le rha h  */
            border: 2px solid black ;
            background-color:purple;
            width : 15px ;
            height : 15px ;
            /* margin : 2px ; */
            /* ordr property jo sbse jiitna jada  order utna bad m ayega jitna km vo phle  */

        }
                    .order-5 {
                order: 5 ;
                /* ummary TableOrder ValuePositionNegative (-1, -5, etc.)Sabse aage (Start mein)Zero (Default)Apni asli jagah par (Source code ke hisaab se)Positive (1, 10, 100)Sabse pichhe (End mein) */
            }
        
            .item1{
                flex-grow: 4;
                /* ab ye box char box ki jagah le lega baki ka grown one hi rhega  */
                /* flex shrink krne se item ka shrinkage start ho jata h jb screen choti kro to  */
                align-self: flex-end;
                /* isse specific ko ypr ncihe kr skte h isse phle hme bs align -content htana h  */
            }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item"></div>
          <div class="item order-5">b2</div>
            <div class="item1 item"></div>
            <div class="item item2" ></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
          <div class="item"></div>

 
        </div>
    </main>
</body>
</html>
