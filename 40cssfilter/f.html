<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filter </title>
    <style>
.img1{
    border : 2px solid blue ;
    filter: blur(10px);
}
.img2{
    filter: contrast(200%);



}

.img3{
filter: grayscale(80%);
}
.img4{
filter: hue-rotate(90deg);
}
.img5{
    filter: drop-shadow(16px 16px );
}
.img6{
    filter :brightness(100%
    )
}
</style>
</head>
<body>
<div class="cont">
        <div class="img1"><img 
    src="image.png">
    </div>
        <div class="img2"><img 
    src="image.png">
    </div>    <div class="img3"><img 
    src="image.png">
    </div>    <div
    class="img4"><img 
    src="image.png">
    </div>    <div
    class="img5"> <img 
    src="image.png">
    </div>    <div class="img6"><img 
    src="image.png">
    </div>
</div>
</body>
</html>
