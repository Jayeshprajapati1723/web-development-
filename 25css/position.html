<!-- Gemini said
Aapka code ekdum badhiya hai! Aapne comments mein Static, Relative, aur Absolute ko kaafi had tak sahi samjha hai. CSS Position properties website ke elements ko "place" karne ke liye sabse powerful tool hain.

Chaliye, aapke code ke basis par in properties ko thoda aur deeply aur mst examples ke saath clear karte hain:

1. Static (Default)
Ye har element ki normal halat hoti hai.

Isme top, bottom, left, right kaam nahi karte.

Box wahi rehta hai jahan HTML mein likha gaya hai.



. Relative (Apni jagah se hilao 🏃‍♂️)
Jab aap position: relative; dete hain, toh box apni asli (original) jagah ke respect mein hilta hai.

Khaas Baat: Box jahan se hilta hai, wahan ki khaali jagah (gap) bachi rehti hai. Dusre boxes ko lagta hai ki box abhi bhi wahi hai.



Absolute (Azaad Panchi 🦅)
Ye box normal flow se bahar nikal jata hai.

Rule: Ye apne us Parent ke respect mein position leta hai jisme position: relative (ya koi bhi non-static position) laga ho. Agar kisi parent mein nahi laga, toh ye sidha <html> ke pas chala jayega.

Farq: Ye piche koi jagah nahi chhodta. Niche wale boxes iski purani jagah par aa jate hain.
-->
