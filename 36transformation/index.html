/* 
CSS Transforms ko Harry ne is video mein bahut aasan bhasha mein samjhaya hai. Iska matlab hota hai kisi bhi element (like a box or image) ki shape, size, ya position ko badalna bina baki layout ko chede.

Iske main 4 pillars hain, chaliye unhe step-by-step samajhte hain:

1. Rotate (Ghumana) [02:04]
Isse aap apne element ko kisi bhi angle par ghuma sakte ho.

rotate(45deg): Ye element ko 45 degree clock-wise ghuma dega.

rotateX / rotateY: Ye 3D mein ghumata hai. Jaise rotateY(180deg) karne se element "flip" ho jayega [04:13].

2. Scale (Chota-Bada karna) [04:43]
Isse aap kisi bhi element ko zoom-in ya zoom-out kar sakte ho.

scale(2): Isse box ka size double ho jayega.

scale(0.5): Isse size aadha ho jayega.

scaleX ya scaleY: Sirf ek side se lamba ya chauda karne ke liye.

3. Translate (Khiskana) [05:47]
Ye sabse zyada use hone wali property hai. Isse aap element ko uski jagah se move karte ho.

translate(50px, 100px): Matlab X-axis (right) mein 50px aur Y-axis (niche) mein 100px move karo.

Fayda: Harry ne bataya ki iska use zyadatar Navbar ko hide/show karne mein kiya jata hai (translateY(-100%)) [06:56]. */

transform: translate(100px, 50px);

/* . Skew (Tedha karna) [05:21]
Isse element ko "pakad kar khinchne" jaisa effect milta hai, jaise parallelogram.

skew(20deg): Box ko thoda tedha kar dega.

Dhyan dein: Skew sirf X aur Y axis mein hota hai, Z axis mein nahi */
transform: skew(20deg);
transform: skewX(20deg);
transform: skewY(20deg);
